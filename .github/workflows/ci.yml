name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  smoke:
    needs: validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: wellness_platform
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d wellness_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/wellness_platform
      NEXT_PUBLIC_WEB_URL: http://localhost:3000
      NEXT_PUBLIC_ADMIN_URL: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:4000
      EXPO_PUBLIC_API_URL: http://localhost:4000
      EXPO_PUBLIC_APP_SCHEME: moveyou
      API_BOOTSTRAP_ADMIN_EMAIL: support@moveyou.app
      API_BOOTSTRAP_ADMIN_PASSWORD: dev-password
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      RAZORPAY_KEY_ID: ""
      RAZORPAY_KEY_SECRET: ""
      RAZORPAY_WEBHOOK_SECRET: ""
      GEMINI_API_KEY: ""
      AI_ENABLED: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke setup
        run: pnpm smoke:setup

      - name: Smoke
        run: pnpm smoke
